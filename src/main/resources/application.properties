spring.application.name=erp_pos_api
server.port=8090

# PostgreSQL DataSource
spring.datasource.url=jdbc:postgresql://localhost:5432/erp_pos
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
# Batch lazy @ManyToOne / collection loads into IN (...) queries to avoid N+1
# on list endpoints (e.g. GET /products mapping category/brand/unit/tax per row,
# and getById on invoices/POs that expose item collections). Hibernate 6 also
# applies this to collection fetching, so a list of N rows costs a small constant
# number of queries instead of 1 + (associations x N).
spring.jpa.properties.hibernate.default_batch_fetch_size=100

# OAuth2 Resource Server (JWT) — point this at your Authorization Server's issuer.
# Validation is enabled only when this property is set (see SecurityConfig).
# spring.security.oauth2.resourceserver.jwt.issuer-uri=https://your-auth-server/realms/erp
erp.security.enabled=true

# Local JWT issuance (POST /api/v1/auth/login). The same HMAC secret signs and
# validates tokens, so login-issued tokens work when erp.security.enabled=true.
# Override the secret in production (must be >= 32 bytes for HS256).
erp.security.jwt.secret=change-me-to-a-long-random-secret-at-least-32-bytes-please
erp.security.jwt.access-token-ttl-seconds=3600

# Seed a SUPER_ADMIN user on startup if it does not already exist.
erp.security.seed-superadmin=true
erp.security.superadmin-username=superadmin
erp.security.superadmin-password=123456

# Logging

logging.level.root=INFO
logging.level.com.theara.erp=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%n%d{yyyy-MM-dd HH:mm:ss} | %highlight(%-5level) | %cyan(%-40logger{40}) | %msg%n

# Swagger / SpringDoc
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
