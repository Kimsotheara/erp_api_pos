spring.application.name=erp_pos_api
server.port=8090

# PostgreSQL DataSource
spring.datasource.url=jdbc:postgresql://localhost:5432/erp_pos
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# OAuth2 Resource Server (JWT) — point this at your Authorization Server's issuer.
# Validation is enabled only when this property is set (see SecurityConfig).
# spring.security.oauth2.resourceserver.jwt.issuer-uri=https://your-auth-server/realms/erp
erp.security.enabled=false

# Logging
logging.level.root=INFO
logging.level.com.theara.erp=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%n%d{yyyy-MM-dd HH:mm:ss} | %highlight(%-5level) | %cyan(%-40logger{40}) | %msg%n

# Swagger / SpringDoc
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
